name = "medcore"
compatibility_date = "2026-04-29"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[vars]
# Place your public environment variables here if needed
# NEXT_PUBLIC_APP_URL = "https://medcore.fallonava.my.id"

[triggers]
# ── Cloudflare Free Tier: 100.000 requests/hari ───────────────────────────
# Setiap menit (1440x/hari) terlalu boros. Kita pakai setiap 5 menit.
# 5 menit = 288 eksekusi/hari → aman jauh di bawah limit.
# Delay status dokter maksimal 5 menit, masih sangat layak untuk RS.
crons = ["*/5 * * * *"]
