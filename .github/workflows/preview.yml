name: PR Preview — Neon Branch

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - master

jobs:
  # ── Create Neon branch on PR open/update ──
  preview:
    name: Setup Preview Database
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    outputs:
      branch_url: ${{ steps.neon.outputs.db_url_with_pooler }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Neon Database Branch
        id: neon
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: preview/pr-${{ github.event.pull_request.number }}
          username: neondb_owner

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url_with_pooler }}

      # Run migrations on the preview branch (uses direct connection — no pooler)
      - name: Run Prisma Migrations on Preview Branch
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}

      - name: Comment preview DB URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const branchUrl = `${{ steps.neon.outputs.db_url_with_pooler }}`;
            const body = [
              '## 🐘 Neon Preview Branch Ready',
              '',
              `**Branch:** \`preview/pr-${{ github.event.pull_request.number }}\``,
              '',
              '**To test locally with the preview DB:**',
              '```bash',
              `DATABASE_URL="${branchUrl}" npm run dev`,
              '```',
              '',
              '> This branch is automatically deleted when the PR is closed.',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ── Delete Neon branch on PR close/merge ──
  cleanup:
    name: Cleanup Preview Branch
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: preview/pr-${{ github.event.pull_request.number }}
