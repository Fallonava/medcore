<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E4B82" />
      <stop offset="100%" stop-color="#082A4D" />
    </linearGradient>
    
    <!-- Outer Rings Gradient -->
    <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A73E8" />
      <stop offset="100%" stop-color="#0D47A1" />
    </linearGradient>

    <!-- Gold Accent for "M" -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EBC44F" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
  </defs>

  <!-- Background Base (Rounded Rect for App Icon look) -->
  <rect width="512" height="512" rx="112" fill="url(#bg-gradient)" />

  <!-- Concentric Rings -->
  <circle cx="256" cy="256" r="210" stroke="#1A73E8" stroke-width="12" opacity="0.4" />
  <circle cx="256" cy="256" r="185" stroke="#1A73E8" stroke-width="8" opacity="0.3" />
  <circle cx="256" cy="256" r="160" fill="#0D47A1" fill-opacity="0.2" stroke="#1A73E8" stroke-width="4" />

  <!-- Center Circle for Symbol -->
  <circle cx="256" cy="256" r="140" fill="#0A3D62" />

  <!-- The "M" Stylized Symbol (Gold) -->
  <!-- Left Side of M -->
  <path d="M190 220 C180 220, 160 240, 160 300 C160 340, 180 340, 190 340" stroke="url(#gold-gradient)" stroke-width="24" stroke-linecap="round" fill="none" />
  <!-- Right Side of M -->
  <path d="M322 220 C332 220, 352 240, 352 300 C352 340, 332 340, 322 340" stroke="url(#gold-gradient)" stroke-width="24" stroke-linecap="round" fill="none" />
  <!-- Top Connectors of M -->
  <path d="M190 220 L215 256" stroke="url(#gold-gradient)" stroke-width="24" stroke-linecap="round" />
  <path d="M322 220 L297 256" stroke="url(#gold-gradient)" stroke-width="24" stroke-linecap="round" />

  <!-- Medical Cross (White) -->
  <rect x="226" y="196" width="60" height="120" rx="8" fill="white" />
  <rect x="196" y="226" width="120" height="60" rx="8" fill="white" />
</svg>
